<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Impostor Fútbol</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

body {
  background: radial-gradient(circle at top, #065f46, #022c22);
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
   touch-action: manipulation;
}

/* Fondo estadio animado */
body::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: repeating-linear-gradient(
    0deg,
    rgba(34,197,94,0.15) 0px,
    rgba(34,197,94,0.15) 40px,
    transparent 40px,
    transparent 80px
  );
  animation: moverCesped 10s linear infinite;
  pointer-events:none;
}

@keyframes moverCesped {
  from { transform: translateY(0); }
  to { transform: translateY(-80px); }
}

.app {
  width:100%;
  max-width:420px;
  height:100vh;
  padding:15px;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:2;
}

/* HEADER PRO */
.header {
  text-align:center;
  margin-bottom:10px;
}

.header h1 {
  font-size:22px;
  color:#facc15;
  letter-spacing:1px;
}

.header p {
  font-size:12px;
  opacity:0.7;
}

/* CARD PRINCIPAL */
.card {
  flex:1;
  overflow-y:auto;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  border-radius:25px;
  padding:15px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 20px rgba(34,197,94,0.2);
    overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* BLOQUES */
.bloque {
  background: rgba(255,255,255,0.03);
  padding: 10px;
  border-radius: 12px;
 margin-bottom: 22px;
}

.bloque h3 {
  font-size:13px;
   margin-bottom: 10px;
  color:#facc15;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* SELECTORES */
.selector {
  display:flex;
  align-items:center;
  justify-content:space-between;
  background: rgba(255,255,255,0.05);
  border-radius:12px;
  padding:8px;
}

.selector button {
  width:40px;
  height:40px;
  border:none;
  border-radius:10px;
  background:#0ea5e9;
  color:white;
  font-size:18px;
  font-weight:bold;
}

.num {
  font-size:20px;
  font-weight:bold;
}

/* GRID CATEGORIAS */
.gridCategorias {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:8px;
}

.gridCategorias button {
  padding:10px;
  border:none;
  border-radius:10px;
  background: rgba(255,255,255,0.08);
  color:white;
  font-size:12px;
  font-weight:bold;
}

.gridCategorias button.activeCat {
  background:#facc15;
  color:black;
  transform: scale(0.9);
}

/* BOTON PRINCIPAL */
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  margin-top:10px;
  font-weight:bold;
  color:white;
  font-size:16px;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}


/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background: rgba(255,255,255,0.1);
  color:white;
}

/* TIMER */
.timer {
  font-size:14px;
  margin:5px;
  padding:6px;
  border-radius:10px;
  background: rgba(0,0,0,0.4);
}

/* TEXTO PALABRA */
.word {
  font-size:22px;
  font-weight:bold;
}
.screen {
  display: none;
}

.screen.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.active {
  display: block;
}


@keyframes aparecer {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>

</head>

<body>

<!-- ===================== -->
<!-- 1️⃣ CATEGORÍA -->
<!-- ===================== -->
<div id="categoriaScreen" class="screen active">

  <div class="header">
    <h1>⚽ Impostor Fútbol</h1>
    <p>Elige una categoría</p>
  </div>

  <div class="card">
    <div class="gridCategorias">
      <button onclick="seleccionarCategoria('jugadores'); irTiempos()">Jugadores</button>
      <button onclick="seleccionarCategoria('clubes'); irTiempos()">Clubes</button>
      <button onclick="seleccionarCategoria('selecciones'); irTiempos()">Selecciones</button>
      <button onclick="seleccionarCategoria('mixto'); irTiempos()">Mixto</button>
      <button onclick="seleccionarCategoria('dts'); irTiempos()">DTs</button>
      <button onclick="seleccionarCategoria('estadios'); irTiempos()">Estadios</button>
    </div>
  </div>

</div>

<!-- ===================== -->
<!-- 2️⃣ TIEMPOS -->
<!-- ===================== -->
<div id="tiempoScreen" class="screen">

  <div class="header">
    <h1>⏱ Configura el tiempo</h1>
  </div>

  <div class="card">

    <div class="bloque">
      <h3>Tiempo de ronda</h3>
      <div class="selector">
        <button onclick="cambiarTiempo('ronda', -10)">−</button>
        <div class="num" id="tiempoRondaTxt">60</div>
        <button onclick="cambiarTiempo('ronda', 10)">+</button>
      </div>
    </div>

    <div class="bloque">
      <h3>Tiempo de votación</h3>
      <div class="selector">
        <button onclick="cambiarTiempo('votacion', -5)">−</button>
        <div class="num" id="tiempoVotacionTxt">10</div>
        <button onclick="cambiarTiempo('votacion', 5)">+</button>
      </div>
    </div>

  </div>

  <button class="btn" onclick="irJugadores()">Siguiente</button>
</div>

<!-- ===================== -->
<!-- 3️⃣ JUGADORES -->
<!-- ===================== -->
<div id="jugadoresScreen" class="screen">

  <div class="header">
    <h1>👥 Jugadores</h1>
  </div>

  <div class="card">
    <div class="selector">
      <button onclick="cambiarNum(-1)">−</button>
      <div class="num" id="numJugadores">4</div>
      <button onclick="cambiarNum(1)">+</button>
    </div>
  </div>

  <button class="btn" onclick="irNombres()">Continuar</button>
</div>


<!-- NOMBRES -->
<div id="nombresScreen" class="screen">
  <div class="card">
    <p>Escribe los nombres</p>
    <div id="inputsNombres"></div>
  </div>
  <button class="btn" onclick="iniciarJuego()">Empezar</button>
</div>

<!-- PASAR CELULAR -->
<div id="pasarScreen" class="screen">
  <div class="card">
    <h2 id="pasarTexto"></h2>
    <p>Tapa la pantalla 🤫</p>
  </div>
  <button class="btn" onclick="mostrarJugador()">Continuar</button>
</div>

<!-- JUGADOR -->
<div id="jugadorScreen" class="screen">
  <div class="card">
    <h2 id="playerText"></h2>
    <div class="word" id="word">???</div>
  </div>
  <button class="btn" onclick="mostrarPalabra()">Mostrar</button>
  <button class="btn" onclick="siguienteJugador()">Siguiente</button>
</div>

<!-- VOTACION -->
<div id="votacionScreen" class="screen">

  <div class="timer" id="timerRonda">Ronda: 60</div>
  <div class="timer" id="timerVotacion">Votación: 10</div>

  <div class="card">
    <p>¿Quién es el impostor?</p>
    <div id="listaJugadores"></div>
  </div>
</div>

<!-- RESULTADO -->
<div id="resultadoScreen" class="screen">
  <div class="card">
    <h2 id="resultadoTexto"></h2>
  </div>
</div>

</div>

<audio id="sClick" src="sounds/click.mp3"></audio>
<audio id="sReveal" src="sounds/reveal.mp3"></audio>
<audio id="sVote" src="sounds/vote.mp3"></audio>
<audio id="sWin" src="sounds/win.mp3"></audio>
<audio id="sLose" src="sounds/lose.mp3"></audio>
<audio id="sTick" src="sounds/tick.mp3"></audio>

<script>

  function irTiempos(){
  playSound("sClick");
  cambiarPantalla("tiempoScreen");
}

function irJugadores(){
  playSound("sClick");
  cambiarPantalla("jugadoresScreen");
}

  function detenerTimers(){
  clearInterval(intervaloRonda);
  clearInterval(intervaloVotacion);
}

  function cambiarTiempo(tipo, valor){
  playSound("sClick");

  if(tipo === "ronda"){
    tiempoRondaConfig += valor;
    if(tiempoRondaConfig < 20) tiempoRondaConfig = 20;
    if(tiempoRondaConfig > 300) tiempoRondaConfig = 300;

    document.getElementById("tiempoRondaTxt").textContent = tiempoRondaConfig;
  }

  if(tipo === "votacion"){
    tiempoVotacionConfig += valor;
    if(tiempoVotacionConfig < 5) tiempoVotacionConfig = 5;
    if(tiempoVotacionConfig > 60) tiempoVotacionConfig = 60;

    document.getElementById("tiempoVotacionTxt").textContent = tiempoVotacionConfig;
  }
}

  let tiempoRondaConfig = 60;
let tiempoVotacionConfig = 10;


let numJugadores = 4;
let nombres = [];
let jugadorActual = 0;
let jugadoresVivos = [];
let impostor = 0;
let palabra = "";

let categoriaSeleccionada = "mixto";

const datos = {
  jugadores: [
    "Messi","Cristiano Ronaldo","Kylian Mbappé","Erling Haaland","Neymar",
    "Kevin De Bruyne","Vinicius Jr","Jude Bellingham","Harry Kane",
    "Robert Lewandowski","Antoine Griezmann","Mohamed Salah","Pedri",
    "Gavi","Luka Modrić","Toni Kroos","Sergio Ramos","Karim Benzema",
    "Ángel Di María","Lautaro Martínez"
  ],

  clubes: [
    "Real Madrid","Barcelona","Manchester City","Manchester United","Liverpool",
    "Chelsea","Arsenal","Bayern Múnich","PSG","Juventus",
    "AC Milan","Inter de Milán","Atlético de Madrid","Borussia Dortmund",
    "Napoli","Tottenham","Ajax","Porto","Benfica","Flamengo"
  ],

  selecciones: [
    "Brasil","Argentina","Francia","Alemania","España",
    "Inglaterra","Portugal","Países Bajos","Italia","Uruguay",
    "Colombia","Chile","México","Estados Unidos","Bélgica",
    "Croacia","Marruecos","Japón","Corea del Sur","Senegal"
  ],
  dts: [
    "Pep Guardiola","Carlo Ancelotti","Jürgen Klopp","Diego Simeone",
    "Luis Enrique","Zinedine Zidane","José Mourinho","Xavi Hernández",
    "Erik ten Hag","Thomas Tuchel","Didier Deschamps","Lionel Scaloni",
    "Gareth Southgate","Tite","Marcelo Bielsa","Jorge Sampaoli",
    "Unai Emery","Mikel Arteta","Antonio Conte","Stefano Pioli"
  ],

  estadios: [
    "Santiago Bernabéu","Camp Nou","Old Trafford","Anfield",
    "Allianz Arena","Parc des Princes","San Siro","Metropolitano",
    "Signal Iduna Park","Maracaná","Monumental","Wembley",
    "Stamford Bridge","Etihad Stadium","San Paolo","Estadio Azteca",
    "Mineirão","Centenario","Amsterdam Arena","Da Luz"
  ]
};


/* TIMERS */
let tiempoVotacion = 30;
let tiempoRonda = 60;
let intervaloVotacion;
let intervaloRonda;

/* sonidos */
function beep(tipo){
  const ctx=new AudioContext();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = tipo==="win"?900:tipo==="error"?200:400;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
  osc.stop(ctx.currentTime+0.3);
}

function playSound(id){
  let s = document.getElementById(id);
  if(!s) return;
  s.currentTime = 0;
  s.play().catch(()=>{});
}

/* selector */
function cambiarNum(v){
  playSound("sClick"); 
  numJugadores+=v;
  if(numJugadores<3)numJugadores=3;
  if(numJugadores>10)numJugadores=10;
  document.getElementById("numJugadores").textContent=numJugadores;
}

/* categoría */
function seleccionarCategoria(cat){
  categoriaSeleccionada = cat;
}

/* nombres */
function irNombres(){
  let cont=document.getElementById("inputsNombres");
  cont.innerHTML="";
  for(let i=0;i<numJugadores;i++){
    let input=document.createElement("input");
    input.placeholder="Jugador "+(i+1);
    cont.appendChild(input);
  }
  cambiarPantalla("nombresScreen");
}

/* iniciar */
function iniciarJuego(){
  nombres=[];
  document.querySelectorAll("#inputsNombres input").forEach(inp=>{
    nombres.push(inp.value || "Jugador");
  });

  jugadoresVivos = nombres.map((n,i)=>({id:i}));

  impostor=Math.floor(Math.random()*numJugadores);

  if(categoriaSeleccionada==="mixto"){
    let all=[
  ...datos.jugadores,
  ...datos.clubes,
  ...datos.selecciones,
  ...datos.dts,
  ...datos.estadios
];
    palabra=all[Math.floor(Math.random()*all.length)];
  } else {
    let lista=datos[categoriaSeleccionada];
    palabra=lista[Math.floor(Math.random()*lista.length)];
  }

  jugadorActual=0;
  mostrarPasar();
}

/* pasar celular */
function mostrarPasar(){
  cambiarPantalla("pasarScreen");
  document.getElementById("pasarTexto").textContent="Pasa el celular a "+nombres[jugadorActual];
}

function mostrarJugador(){
    playSound("sClick");
  cambiarPantalla("jugadorScreen");
  document.getElementById("playerText").textContent=nombres[jugadorActual];
  word.textContent="???";
  word.style.color="white";
}

/* palabra */
function mostrarPalabra(){
  playSound("sReveal");

  word.style.transform = "scale(1.3)";
  setTimeout(()=>{
    word.style.transform = "scale(1)";
  },200);

  if(jugadorActual===impostor){
    word.textContent="😈 ERES EL IMPOSTOR";
    word.style.color="red";
  }else{
    word.textContent=palabra;
    word.style.color="lime";
  }
}

/* siguiente */
function siguienteJugador(){
    playSound("sClick");
  jugadorActual++;
  if(jugadorActual>=numJugadores){
    iniciarRonda(); // 👈 ahora inicia ronda con timer
  }else{
    mostrarPasar();
  }
}

/* ========================= */
/* ⏳ TIMER DE RONDA */
/* ========================= */
function iniciarRonda(){
  cambiarPantalla("votacionScreen");
  renderJugadores();

  tiempoRonda = tiempoRondaConfig;

  document.getElementById("timerRonda").textContent = "Ronda: " + tiempoRonda;

  clearInterval(intervaloRonda);

  intervaloRonda = setInterval(()=>{
    tiempoRonda--;

    let el = document.getElementById("timerRonda");
    el.textContent = "Ronda: " + tiempoRonda;

    if(tiempoRonda <= 5){
  el.style.color = "red";
  el.style.transform = "scale(1.2)";
  if(tiempoRonda <= 5 && tiempoRonda > 0){
  playSound("sTick");
}
}

    if(tiempoRonda <= 0){
      clearInterval(intervaloRonda);
      clearInterval(intervaloVotacion);

      resultadoTexto.textContent="⏳ Se acabó el tiempo. Gana el impostor 😈";
      cambiarPantalla("resultadoScreen");
      setTimeout(volverInicio,2500);
    }
  },1000);

  iniciarVotacion();
}

/* ========================= */
/* 🗳️ TIMER DE VOTACIÓN */
/* ========================= */
function iniciarVotacion(){

  

  tiempoVotacion = tiempoVotacionConfig;

  let el = document.getElementById("timerVotacion");
  el.textContent = "Votación: " + tiempoVotacion;
  el.style.color = "white";

  clearInterval(intervaloVotacion);

  intervaloVotacion = setInterval(()=>{
    tiempoVotacion--;

    el.textContent = "Votación: " + tiempoVotacion;

    if(tiempoVotacion <= 3){
  el.style.color = "red";
  el.style.transform = "scale(1.2)";
  if(tiempoVotacion <= 3 && tiempoVotacion > 0){
  playSound("sTick");
}
} else {
  el.style.transform = "scale(1)";
}

    if(tiempoVotacion <= 0){
      clearInterval(intervaloVotacion);
    }
  },1000);
}

/* render jugadores */
function renderJugadores(){
  listaJugadores.innerHTML="";
  jugadoresVivos.forEach(j=>{
    let b=document.createElement("button");
    b.textContent=nombres[j.id];
    b.className="btn playerBtn";
    b.onclick=()=>votar(j.id);
    listaJugadores.appendChild(b);
  });
}

/* votar */
function votar(id){
detenerTimers();
    playSound("sVote");
  beep("error");

  jugadoresVivos=jugadoresVivos.filter(j=>j.id!==id);

  if(id===impostor){
    resultadoTexto.textContent="Revelando...";
    setTimeout(()=>{
    playSound("sWin");
    
     document.body.style.background = "linear-gradient(135deg, #16a34a, #22c55e)";

    setTimeout(()=>{
      document.body.style.background = "";
    },1000);

    resultadoTexto.textContent="🔥 Era el impostor. Ganan inocentes";
    },800);
    cambiarPantalla("resultadoScreen");
    setTimeout(volverInicio,2500);
    return;
  }

  if(jugadoresVivos.length===2){
    resultadoTexto.textContent="Revelando...";
    setTimeout(()=>{
    playSound("sLose");
    resultadoTexto.textContent="😈 Gana el impostor";
    },800);
    cambiarPantalla("resultadoScreen");
    setTimeout(volverInicio,2500);
    return;
  }

  resultadoTexto.textContent="Revelando...";
  setTimeout(()=>{
  playSound("sLose");
  document.body.style.background = "linear-gradient(135deg, #1e293b, #334155)";

  setTimeout(()=>{
    document.body.style.background = "";
  },500);
  resultadoTexto.textContent="❌ No era el impostor";
  },800);
  cambiarPantalla("resultadoScreen");

  setTimeout(()=>{
    cambiarPantalla("votacionScreen");
    renderJugadores();
    iniciarVotacion();
  },1500);
}

/* pantallas */
function cambiarPantalla(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function volverInicio(){
 detenerTimers();
    cambiarPantalla("categoriaScreen"); 
}

setTimeout(()=>{
  document.querySelector(".card").style.animation="";
},300);
</script>

</body>
</html>
